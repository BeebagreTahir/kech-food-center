<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domino's Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        header .logo img {
            height: 40px;
        }

        header nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #000;
            font-weight: 600;
        }

        .cart-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .cart-main {
            flex: 2;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        .cart-main h2 {
            font-size: 20px;
            margin-bottom: 15px;
        }

        .cart-main p {
            margin-bottom: 20px;
            color: #555;
        }

        .cart-main button {
            padding: 10px 20px;
            background-color: #0056b3;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .suggestions {
            margin-top: 30px;
            text-align: left;
        }

        .suggestions h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }

        .suggestion-items {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .suggestion-item {
            background: #fff;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            width: 150px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .suggestion-item img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .cart-sidebar {
            flex: 1;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            height: fit-content;
        }

        .cart-sidebar h4 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .voucher-input {
            display: flex;
            margin-bottom: 20px;
        }

        .voucher-input input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px 0 0 5px;
            outline: none;
        }

        .voucher-input button {
            padding: 8px 12px;
            border: none;
            background-color: #f56c6c;
            color: #fff;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
        }

        .order-detail {
            background-color: #0056b3;
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .order-detail svg {
            width: 25px;
            height: 25px;
        }

        .total {
            margin-top: 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        @media(max-width: 900px) {
            .cart-container {
                flex-direction: column;
            }

            .cart-sidebar {
                order: -1;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="./images/" alt="">
    </div>
    <nav>
        <a href="#">MENU</a>
        <a href="#">STORES</a>
        <a href="#">GET THE APP</a>
    </nav>
    <div class="account">
        <a href="#">🛒 0</a>
        <a href="#">MY ACCOUNT</a>
    </div>
</header>

<div class="cart-container">
    <div class="cart-main">
        <h2>My Cart</h2>
        <p>Your cart is currently empty, but your stomach doesn't have to be. Add some items and come back here to checkout.</p>
        <a href="/index.html"><button>START YOUR ORDER</button></a>

        
    </div>

    <div class="cart-sidebar">
       
        <div class="total">
            <span>Grand Total</span>
            <span>Rs. 0</span>
        </div>
    </div>
</div>

</body>
</html>
